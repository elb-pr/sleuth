name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Smoke test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify scripts are executable
        working-directory: skills/claude-sleuth
        run: |
          python scripts/task_runner.py --help
          python scripts/template_builder.py --help
          python scripts/setup.py --list

      - name: Verify core dependency imports
        run: |
          python -c "
          import requests
          import httpx
          import aiohttp
          import bs4
          import pandas
          import numpy
          import rich
          import tqdm
          print('All core imports OK')
          "
